name: Build&Push CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  build:
    name: Build CI (Push)
    runs-on: ubuntu-24.04
    if: ${{ !startsWith(github.event.head_commit.message, '[skip ci]') && success() && github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          mkdir -p "$ANDROID_HOME/licenses/"
          echo > "$ANDROID_HOME/licenses/android-sdk-license"
          echo -n 24333f8a63b6825ea9c5514f83c2829b004d1fee > "$ANDROID_HOME/licenses/android-sdk-license"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: |
          printf '\norg.gradle.parallel=true\norg.gradle.vfs.watch=true\n' >> gradle.properties
          chmod +x ./gradlew
          ./gradlew --stacktrace --no-daemon assembleRelease
          export apk=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$apk" ]; then
            echo "Release APK not found" >&2
            exit 1
          fi
          echo "APK_FILE=$apk" >> "$GITHUB_ENV"

      - name: Show Artifacts SHA256
        run: |
          echo "### Build Success :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "|File|SHA256|" >> "$GITHUB_STEP_SUMMARY"
          echo "|:---|:-----|" >> "$GITHUB_STEP_SUMMARY"
          sha=($(sha256sum "${{ env.APK_FILE }}"))
          echo "|$(basename "${{ env.APK_FILE }}")|${sha[0]}|" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Artifacts(release)
        uses: actions/upload-artifact@v7
        with:
          name: FuckCainiao-release-${{ github.sha }}
          path: ${{ env.APK_FILE }}

      - name: Upload Release to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MESSAGE: |+
            New push to GitHub!
            Commit:
            ${{ github.event_name == 'push' && github.event.head_commit.message || format('Manual dispatch for {0}', github.sha) }}
            By: ${{ github.event_name == 'push' && github.event.head_commit.author.name || github.actor }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_TOKEN and TELEGRAM_CHAT_ID must be set." >&2
            exit 1
          fi
          export CAPTION=$(python3 -c 'import os; msg = os.environ["COMMIT_MESSAGE"].strip(); url = os.environ["COMMIT_URL"]; full = f"{msg}\nURL: {url}"; print((full if len(full) <= 1024 else url)[:1024])')
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            --form-string caption="$CAPTION" \
            -F document=@"${{ env.APK_FILE }}"
